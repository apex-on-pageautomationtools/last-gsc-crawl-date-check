<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSC Crawl Tracker</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #DCDCDC;
      --surface: #F5F5F5;
      --border: #1e1e2e;
      --accent: #00ff88;
      --accent2: #00ccff;
      --danger: #ff4466;
      --text: black;
      --muted: #555570;
      --card: #16161f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.6s ease both;
    }

    .header .badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 3px;
      color: black;
      background: rgba(0, 255, 136, 0.08);
      border: 1px solid rgba(0, 255, 136, 0.2);
      padding: 6px 16px;
      border-radius: 2px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .header h1 {
      font-size: 42px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 400;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .input-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .domain-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .domain-input::placeholder {
      color: var(--muted);
    }

    .domain-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
    }

    .run-btn {
      background: var(--accent);
      color: black;
      border: none;
      border-radius: 8px;
      padding: 14px 28px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    .run-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0, 255, 136, 0.3);
    }

    .run-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .run-btn:disabled {
      background: var(--muted);
      cursor: not-allowed;
      transform: none;
    }

    .status-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      min-height: 80px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.3s;
    }

    .status-box.running {
      border-color: var(--accent2);
    }

    .status-box.success {
      border-color: var(--accent);
    }

    .status-box.error {
      border-color: var(--danger);
    }

    .status-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .status-icon.idle {
      background: rgba(85, 85, 112, 0.3);
    }

    .status-icon.running {
      background: rgba(0, 204, 255, 0.15);
      animation: pulse 1.5s infinite;
    }

    .status-icon.success {
      background: rgba(0, 255, 136, 0.15);
    }

    .status-icon.error {
      background: rgba(255, 68, 102, 0.15);
    }

    .status-text {
      flex: 1;
    }

    .status-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .status-title.running {
      color: var(--accent2);
    }

    .status-title.success {
      color: var(--accent);
    }

    .status-title.error {
      color: var(--danger);
    }

    .status-title.idle {
      color: var(--muted);
    }

    .status-sub {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent2);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }

    .dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    .history-section {
      margin-top: 28px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .history-title {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .clear-btn:hover {
      color: var(--danger);
      border-color: var(--danger);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 240px;
      overflow-y: auto;
    }

    .history-list::-webkit-scrollbar {
      width: 4px;
    }

    .history-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .history-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      animation: fadeUp 0.3s ease both;
    }

    .history-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .history-dot.success {
      background: var(--accent);
    }

    .history-dot.error {
      background: var(--danger);
    }

    .history-domain {
      flex: 1;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--text);
    }

    .history-time {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .history-status {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 4px;
    }

    .history-status.success {
      background: rgba(0, 255, 136, 0.1);
      color: var(--accent);
    }

    .history-status.error {
      background: rgba(255, 68, 102, 0.1);
      color: var(--danger);
    }

    .empty-history {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
    }

    .footer {
      margin-top: 32px;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .footer span {
      color: var(--accent);
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(0, 204, 255, 0.4);
      }

      50% {
        box-shadow: 0 0 0 8px rgba(0, 204, 255, 0);
      }
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.5;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
 
  <div class="wrapper">
 
    <div class="header">
      <div class="badge">GSC Automation Tool</div>
      <h1>Crawl Date<br><span>Tracker</span></h1>
      <p>Enter domain &rarr; Run workflow &rarr; Google Sheet updated</p>
    </div>
 
    <div class="card">
      <label class="input-label">Domain Name</label>
      <div class="input-row">
        <input type="text" class="domain-input" id="domainInput" placeholder="313movers.com.au"
          autocomplete="off" spellcheck="false" />
        <button class="run-btn" id="runBtn" onclick="runWorkflow()">
          &#9654; Run
        </button>
      </div>
 
      <div class="status-box" id="statusBox">
        <div class="status-icon idle" id="statusIcon">&#11041;</div>
        <div class="status-text">
          <div class="status-title idle" id="statusTitle">Ready</div>
          <div class="status-sub" id="statusSub">Enter a domain and click Run</div>
        </div>
      </div>
    </div>
 
    <div class="history-section">
      <div class="history-header">
        <span class="history-title">Run History</span>
        <button class="clear-btn" onclick="clearHistory()">Clear</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="empty-history" id="emptyMsg">No runs yet</div>
      </div>
    </div>
 
    <div class="footer">
      Connected to <span>Google Apps Script</span> &middot; Always Active
    </div>
 
  </div>
 
  <script>
    const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxm5YgWHbrXMmeplTP5q0nY-GLNO1sdIaq0zK7ohiCUdSDJzcSYteA3hN0XW7u-4OBP/exec';
    let history = JSON.parse(localStorage.getItem('gsc_history') || '[]');
 
    document.getElementById('domainInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') runWorkflow();
    });
 
    renderHistory();
 
    async function runWorkflow() {
      const domain = document.getElementById('domainInput').value.trim();
 
      if (!domain) {
        setStatus('error', '\u26A0 Domain Required', 'Please enter a domain name first');
        return;
      }
 
      setStatus('running', 'Processing...', `Running workflow for: ${domain}`);
      document.getElementById('runBtn').disabled = true;
      document.getElementById('domainInput').disabled = true;
 
      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ domain: domain })
        });
 
        const data = await response.json();
 
        if (data.success) {
          setStatus('success', '\u2713 Completed!', `Sheet updated for ${domain} (${data.processed} URLs)`);
          addHistory(domain, 'success');
        } else {
          setStatus('error', '\u2715 Failed', data.error || 'Workflow encountered an error');
          addHistory(domain, 'error');
        }
 
      } catch (err) {
        setStatus('error', '\u2715 Connection Failed', 'Could not reach the Apps Script web app');
        addHistory(domain, 'error');
      } finally {
        document.getElementById('runBtn').disabled = false;
        document.getElementById('domainInput').disabled = false;
      }
    }
 
    function setStatus(type, title, sub) {
      const box = document.getElementById('statusBox');
      const icon = document.getElementById('statusIcon');
      const titleEl = document.getElementById('statusTitle');
      const subEl = document.getElementById('statusSub');
 
      box.className = `status-box ${type}`;
      icon.className = `status-icon ${type}`;
      titleEl.className = `status-title ${type}`;
 
      const icons = { idle: '\u2B21', running: '', success: '\u2713', error: '\u2715' };
      const dots = type === 'running'
        ? '<div class="dots"><span></span><span></span><span></span></div>'
        : icons[type];
 
      icon.innerHTML = dots;
      titleEl.textContent = title;
      subEl.textContent = sub;
    }
 
    function addHistory(domain, status) {
      const now = new Date();
      const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString('en-US', { day: '2-digit', month: 'short' });
 
      history.unshift({ domain, status, time, date });
      if (history.length > 20) history.pop();
      localStorage.setItem('gsc_history', JSON.stringify(history));
      renderHistory();
    }
 
    function renderHistory() {
      const list = document.getElementById('historyList');
      if (history.length === 0) {
        list.innerHTML = '<div class="empty-history">No runs yet</div>';
        return;
      }
      list.innerHTML = history.map(item => `
      <div class="history-item">
        <div class="history-dot ${item.status}"></div>
        <div class="history-domain">${item.domain}</div>
        <div class="history-time">${item.date} ${item.time}</div>
        <div class="history-status ${item.status}">${item.status === 'success' ? 'Done' : 'Failed'}</div>
      </div>
    `).join('');
    }
 
    function clearHistory() {
      history = [];
      localStorage.removeItem('gsc_history');
      renderHistory();
    }
  </script>
</body>
 
</html>
