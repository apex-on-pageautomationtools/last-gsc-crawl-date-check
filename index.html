<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSC Crawl Tracker</title>
<link rel="icon" type="image/png" href="./favicon.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-grad-1:#F5F0FF;
  --bg-grad-2:#EFE7FF;
  --bg-grad-3:#FBF8FF;
  --surface:#FFFFFF;
  --surface-soft:#F7F3FF;
  --border:#E6DDF5;
  --border-soft:#EEE6FA;
  --accent:#6D4EF2;
  --accent-2:#8B6DF7;
  --accent-grad:linear-gradient(135deg,#7A56F4 0%,#5B3BDB 100%);
  --text:#0F0A1F;
  --text-soft:#1F1A33;
  --muted:#6B6580;
  --muted-2:#8B8499;
  --success:#10A968;
  --success-bg:#E6F7EF;
  --warning:#E08400;
  --warning-bg:#FFF4E0;
  --danger:#D9304A;
  --danger-bg:#FCE7EB;
  --info:#3A6FE0;
  --info-bg:#E5EEFC;
  --shadow-sm:0 1px 2px rgba(15,10,31,.04), 0 1px 1px rgba(15,10,31,.03);
  --shadow-md:0 4px 12px rgba(99,70,220,.06), 0 2px 4px rgba(15,10,31,.04);
  --shadow-lg:0 12px 32px rgba(99,70,220,.10), 0 4px 12px rgba(15,10,31,.05);
  --shadow-cta:0 8px 20px rgba(109,78,242,.32), 0 2px 6px rgba(109,78,242,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:
    radial-gradient(1200px 600px at 10% -10%, #E9DEFF 0%, transparent 60%),
    radial-gradient(900px 500px at 110% 0%, #DCD0FF 0%, transparent 55%),
    linear-gradient(180deg, var(--bg-grad-1) 0%, var(--bg-grad-3) 100%);
  color:var(--text);
  font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;
  padding:56px 20px 80px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
.wrapper{width:100%;max-width:1120px;margin:0 auto;position:relative;z-index:1}

/* Header */
.header{text-align:center;margin-bottom:36px}
.header .badge{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;
  background:rgba(109,78,242,.08);color:var(--accent);
  border:1px solid rgba(109,78,242,.18);
  padding:7px 14px;border-radius:999px;margin-bottom:22px;text-transform:uppercase;font-weight:500;
}
.header .badge::before{
  content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 0 4px rgba(109,78,242,.15);
}
.header h1{
  font-size:56px;font-weight:800;line-height:1.05;letter-spacing:-1.5px;
  color:var(--text);
}
.header h1 .accent{
  background:var(--accent-grad);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.header p{
  margin-top:14px;color:var(--muted);font-size:16px;font-weight:400;line-height:1.5;
  max-width:620px;margin-left:auto;margin-right:auto;
}
.header p .chip{
  font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);
  background:rgba(109,78,242,.08);padding:1px 6px;border-radius:4px;font-weight:500;
}

/* Card */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:28px;
  margin-bottom:20px;
  box-shadow:var(--shadow-md);
}
.input-label{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;
  color:var(--muted-2);text-transform:uppercase;font-weight:500;
  margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
}
.urls-input{
  width:100%;min-height:220px;resize:vertical;line-height:1.65;
  background:var(--surface-soft);
  border:1px solid var(--border-soft);
  border-radius:12px;
  padding:16px 18px;color:var(--text-soft);
  font-family:'JetBrains Mono',monospace;font-size:13.5px;
  outline:none;
  transition:border-color .2s, box-shadow .2s, background .2s;
}
.urls-input::placeholder{color:#B5ABCC}
.urls-input:hover{background:#FBF8FF}
.urls-input:focus{
  border-color:var(--accent);
  background:#FFFFFF;
  box-shadow:0 0 0 4px rgba(109,78,242,.12);
}
.url-count{
  font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);
  margin-top:10px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
}
.url-count.over span:first-child{color:var(--danger);font-weight:700}

/* Buttons */
.btn-row{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}
.btn{
  border:1px solid transparent;border-radius:12px;
  padding:13px 22px;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;
  transition:transform .15s, box-shadow .2s, background .2s, border-color .2s, opacity .2s, color .2s;
  letter-spacing:.1px;display:inline-flex;align-items:center;gap:8px;
}
.btn-run{
  background:var(--accent-grad);color:#fff;
  box-shadow:var(--shadow-cta);
}
.btn-run:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 12px 28px rgba(109,78,242,.40),0 4px 10px rgba(109,78,242,.22)}
.btn-pause{
  background:#FFF;color:var(--warning);border-color:#F5D9A7;
}
.btn-pause:hover:not(:disabled){background:var(--warning-bg);transform:translateY(-1px)}
.btn-resume{
  background:#FFF;color:var(--info);border-color:#C5D6F5;
}
.btn-resume:hover:not(:disabled){background:var(--info-bg);transform:translateY(-1px)}
.btn-stop{
  background:#FFF;color:var(--danger);border-color:#F0C2CC;
}
.btn-stop:hover:not(:disabled){background:var(--danger-bg);transform:translateY(-1px)}
.btn-csv{
  background:var(--accent-grad);color:#fff;
  box-shadow:0 4px 12px rgba(109,78,242,.24);
  padding:10px 18px;font-size:13px;
}
.btn-csv:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 18px rgba(109,78,242,.32)}
.btn:disabled{
  background:#F2EEFA;color:#B5ABCC;border-color:#EEE6FA;
  cursor:not-allowed;transform:none;opacity:.75;box-shadow:none;
}

/* Progress */
.progress-box{
  background:var(--surface-soft);
  border:1px solid var(--border-soft);
  border-radius:14px;padding:18px;margin-top:20px;display:none;
}
.progress-box.visible{display:block}
.progress-bar-track{
  background:#EDE5FA;border-radius:999px;height:8px;overflow:hidden;margin:12px 0;
}
.progress-bar-fill{
  background:var(--accent-grad);height:100%;
  transition:width .3s ease;width:0%;border-radius:999px;
}
.progress-bar-fill.paused{background:linear-gradient(135deg,#F5B042,#E08400)}
.progress-bar-fill.stopped{background:linear-gradient(135deg,#EE5A75,#D9304A)}
.progress-info{
  display:flex;justify-content:space-between;
  font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);
  flex-wrap:wrap;gap:8px;
}
.progress-state{
  font-weight:700;text-transform:uppercase;letter-spacing:1.2px;font-size:11px;
  padding:3px 10px;border-radius:999px;
}
.progress-state.running{color:var(--info);background:var(--info-bg)}
.progress-state.paused{color:var(--warning);background:var(--warning-bg)}
.progress-state.completed{color:var(--success);background:var(--success-bg)}
.progress-state.stopped{color:var(--danger);background:var(--danger-bg)}
.progress-state.idle{color:var(--muted-2);background:#F2EEFA}

/* Results */
.results-card{display:none}
.results-card.visible{display:block}
.results-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:18px;flex-wrap:wrap;gap:12px;
}
.results-title{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;
  font-weight:700;color:var(--text);letter-spacing:-.2px;
}
.results-title .sub{
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted-2);
  font-weight:500;margin-left:8px;letter-spacing:1.2px;text-transform:uppercase;
}
.table-wrap{
  background:var(--surface);
  border:1px solid var(--border-soft);
  border-radius:14px;overflow:auto;max-height:600px;
}
table{width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:13px}
thead{
  position:sticky;top:0;background:#F7F3FF;
  border-bottom:1px solid var(--border-soft);z-index:1;
}
th{
  text-align:left;padding:14px 16px;font-weight:600;letter-spacing:1.2px;
  font-size:11px;text-transform:uppercase;color:var(--muted);
  font-family:'Plus Jakarta Sans',sans-serif;
}
td{
  padding:13px 16px;border-bottom:1px solid #F1ECF9;
  vertical-align:top;word-break:break-all;color:var(--text-soft);
}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#FBF8FF}
tbody tr.pending td{opacity:.55}
tbody tr.processing{background:rgba(109,78,242,.05)}
tbody tr.processing:hover{background:rgba(109,78,242,.08)}

/* Status badges */
.badge-ok,.badge-never,.badge-err,.badge-pending,.badge-running{
  padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;
  white-space:nowrap;display:inline-block;letter-spacing:.2px;
  font-family:'JetBrains Mono',monospace;
}
.badge-ok{background:var(--success-bg);color:var(--success)}
.badge-never{background:var(--danger-bg);color:var(--danger)}
.badge-err{background:var(--danger-bg);color:var(--danger)}
.badge-pending{background:#F2EEFA;color:var(--muted-2)}
.badge-running{background:var(--info-bg);color:var(--info)}

/* Footer */
.footer{
  margin-top:36px;text-align:center;
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted-2);
  letter-spacing:1.2px;
}
.footer span{color:var(--accent);font-weight:600}

/* Responsive */
@media (max-width:640px){
  body{padding:32px 14px 60px}
  .header h1{font-size:38px;letter-spacing:-1px}
  .header p{font-size:14px}
  .card{padding:20px;border-radius:16px}
  .btn{padding:11px 16px;font-size:13px;flex:1;justify-content:center;min-width:calc(50% - 5px)}
  .btn-csv{flex:none;min-width:auto}
  th,td{padding:10px 12px}
}
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="badge">GSC Automation Tool</div>
    <h1>Crawl Date <span class="accent">Tracker</span></h1>
    <p>Paste up to <span class="chip">100 URLs</span>, run the check, pause anytime, and export the result as a clean CSV.</p>
  </div>

  <div class="card">
    <label class="input-label">
      <span>URLs (one per line, max 100)</span>
    </label>
    <textarea class="urls-input" id="urlsInput" placeholder="https://example.com/page-1&#10;https://anotherdomain.com/about&#10;https://thirdsite.com/contact" spellcheck="false" oninput="updateCount()"></textarea>
    <div class="url-count" id="urlCount"><span>0 / 100 URLs</span><span id="domainSummary"></span></div>

    <div class="btn-row">
      <button class="btn btn-run" id="runBtn" onclick="startWorkflow()">&#9654; Run</button>
      <button class="btn btn-pause" id="pauseBtn" onclick="pauseWorkflow()" disabled>&#10074;&#10074; Pause</button>
      <button class="btn btn-resume" id="resumeBtn" onclick="resumeWorkflow()" disabled>&#9654; Resume</button>
      <button class="btn btn-stop" id="stopBtn" onclick="stopWorkflow()" disabled>&#9632; Stop</button>
    </div>

    <div class="progress-box" id="progressBox">
      <div class="progress-info">
        <span><span class="progress-state idle" id="progressState">Idle</span> &nbsp; <span id="progressCount">0 / 0</span></span>
        <span id="progressEta"></span>
      </div>
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-info">
        <span id="progressDetail">Ready</span>
      </div>
    </div>
  </div>

  <div class="card results-card" id="resultsCard">
    <div class="results-header">
      <span class="results-title">Results <span class="sub">Live</span></span>
      <button class="btn btn-csv" onclick="downloadCSV()">&darr; Download CSV</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>#</th><th>URL</th><th>Domain</th><th>Last Crawl Date</th><th>Index Status</th></tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>

  <div class="footer">Connected to <span>Google Apps Script</span> &nbsp;&middot;&nbsp; Config Hidden</div>
</div>

<script>
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbydUPonVySIRG_Icz2ygWRmDJ1_qEGjhS9vMP9INZF5_f_sD1ZX2d7kRnOqN8YbWeN_/exec';

let workflow = {
  items: [],
  results: [],
  currentIndex: 0,
  state: 'idle',
  startTime: null
};

function updateCount(){
  const lines = document.getElementById('urlsInput').value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const counter = document.getElementById('urlCount');
  const summary = document.getElementById('domainSummary');

  const unique = new Set(lines);
  const dupCount = lines.length - unique.size;

  counter.firstElementChild.textContent = lines.length + ' / 100 URLs' + (dupCount > 0 ? ' (' + dupCount + ' duplicate' + (dupCount === 1 ? '' : 's') + ')' : '');

  if(lines.length > 100){
    counter.classList.add('over');
  } else {
    counter.classList.remove('over');
  }

  const domains = new Set();
  unique.forEach(u => {
    const m = u.match(/^https?:\/\/([^\/]+)/i);
    if(m) domains.add(m[1].toLowerCase().replace(/^www\./, ''));
  });
  summary.textContent = domains.size > 0 ? domains.size + ' unique domain' + (domains.size === 1 ? '' : 's') : '';
}

async function startWorkflow(){
  const rawLines = document.getElementById('urlsInput').value.split('\n').map(l => l.trim()).filter(l => l.length > 0);

  if(rawLines.length === 0){ alert('Please paste at least one URL.'); return; }

  const seen = new Set();
  const urls = [];
  let duplicatesRemoved = 0;
  rawLines.forEach(url => {
    if(seen.has(url)){
      duplicatesRemoved++;
    } else {
      seen.add(url);
      urls.push(url);
    }
  });

  if(urls.length > 100){
    alert('Maximum 100 unique URLs allowed per batch. You have ' + urls.length + ' after removing duplicates.');
    return;
  }

  if(duplicatesRemoved > 0){
    document.getElementById('urlsInput').value = urls.join('\n');
    updateCount();
  }

  const introMsg = duplicatesRemoved > 0
    ? 'Validating ' + urls.length + ' unique URLs (' + duplicatesRemoved + ' duplicate' + (duplicatesRemoved === 1 ? '' : 's') + ' removed)...'
    : 'Validating ' + urls.length + ' URLs...';
  document.getElementById('progressBox').classList.add('visible');
  setProgressState('running', introMsg);
  setButtons({ run: false, pause: false, resume: false, stop: false });

  try {
    const resp = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'validate_batch', urls: urls })
    });
    const data = await resp.json();

    if(!data.success){
      setProgressState('stopped', data.error);
      setButtons({ run: true, pause: false, resume: false, stop: false });
      return;
    }

    workflow.items = data.items;
    workflow.results = data.items.map(i => ({
      url: i.url,
      domain: i.domain || '-',
      accountKey: i.accountKey || '',
      lastCrawlDate: i.ready ? 'Pending' : 'Skipped',
      indexStatus: i.ready ? 'Pending' : (i.error || 'Unknown'),
      status: i.ready ? 'pending' : 'error'
    }));
    workflow.currentIndex = 0;
    workflow.state = 'running';
    workflow.startTime = Date.now();

    document.getElementById('progressBox').classList.add('visible');
    document.getElementById('resultsCard').classList.add('visible');
    renderTable();

    setButtons({ run: false, pause: true, resume: false, stop: true });
    processNext();

  } catch(err){
    setProgressState('stopped', 'Connection failed: ' + err.message);
    setButtons({ run: true, pause: false, resume: false, stop: false });
  }
}

async function processNext(){
  if(workflow.state !== 'running') return;

  while(workflow.currentIndex < workflow.items.length && !workflow.items[workflow.currentIndex].ready){
    workflow.currentIndex++;
  }

  if(workflow.currentIndex >= workflow.items.length){
    workflow.state = 'completed';
    setProgressState('completed', 'All URLs processed.');
    setButtons({ run: true, pause: false, resume: false, stop: false });
    updateProgress();
    return;
  }

  const item = workflow.items[workflow.currentIndex];
  renderTable();
  updateProgress();

  try {
    const resp = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'inspect_single',
        url: item.url,
        domain: item.domain,
        accountKey: item.accountKey
      })
    });
    const data = await resp.json();

    if(data.success){
      workflow.results[workflow.currentIndex] = {
        url: data.url,
        domain: data.domain,
        accountKey: data.accountKey,
        lastCrawlDate: data.lastCrawlDate,
        indexStatus: data.indexStatus,
        status: 'ok'
      };
    } else {
      workflow.results[workflow.currentIndex].lastCrawlDate = 'Error';
      workflow.results[workflow.currentIndex].indexStatus = data.error || 'Unknown error';
      workflow.results[workflow.currentIndex].status = 'error';
    }
  } catch(err){
    workflow.results[workflow.currentIndex].lastCrawlDate = 'Error';
    workflow.results[workflow.currentIndex].indexStatus = 'Network error';
    workflow.results[workflow.currentIndex].status = 'error';
  }

  renderTable();
  workflow.currentIndex++;

  await sleep(300);

  if(workflow.state === 'running'){
    processNext();
  }
}

function pauseWorkflow(){
  if(workflow.state !== 'running') return;
  workflow.state = 'paused';
  setProgressState('paused', 'Paused. Click Resume to continue.');
  setButtons({ run: false, pause: false, resume: true, stop: true });
}

function resumeWorkflow(){
  if(workflow.state !== 'paused') return;
  workflow.state = 'running';
  setProgressState('running', 'Resuming...');
  setButtons({ run: false, pause: true, resume: false, stop: true });
  processNext();
}

function stopWorkflow(){
  if(!confirm('Stop the workflow? Already-fetched results will be kept and can be downloaded.')) return;
  workflow.state = 'stopped';
  setProgressState('stopped', 'Stopped by user. ' + countCompleted() + ' URLs fetched.');
  setButtons({ run: true, pause: false, resume: false, stop: false });
}

function countCompleted(){
  return workflow.results.filter(r => r.status === 'ok' || r.status === 'error').length;
}

function setButtons({ run, pause, resume, stop }){
  document.getElementById('runBtn').disabled = !run;
  document.getElementById('pauseBtn').disabled = !pause;
  document.getElementById('resumeBtn').disabled = !resume;
  document.getElementById('stopBtn').disabled = !stop;
}

function setProgressState(state, detail){
  const stateEl = document.getElementById('progressState');
  const fill = document.getElementById('progressFill');
  stateEl.className = 'progress-state ' + state;
  stateEl.textContent = state;
  fill.className = 'progress-bar-fill' + (state === 'paused' ? ' paused' : state === 'stopped' ? ' stopped' : '');
  document.getElementById('progressDetail').textContent = detail;
  updateProgress();
}

function updateProgress(){
  const done = workflow.currentIndex;
  const total = workflow.items.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressCount').textContent = done + ' / ' + total + ' (' + pct + '%)';
  document.getElementById('progressFill').style.width = pct + '%';

  if(workflow.state === 'running' && done > 0){
    const elapsed = (Date.now() - workflow.startTime) / 1000;
    const perItem = elapsed / done;
    const remaining = Math.round((total - done) * perItem);
    document.getElementById('progressEta').textContent = 'ETA: ~' + remaining + 's';
  } else {
    document.getElementById('progressEta').textContent = '';
  }
}

function renderTable(){
  const body = document.getElementById('resultsBody');
  body.innerHTML = workflow.results.map((r, i) => {
    let rowClass = '';
    if(r.status === 'pending') rowClass = 'pending';
    else if(i === workflow.currentIndex && workflow.state === 'running') rowClass = 'processing';

    let badgeClass = 'badge-pending';
    let badgeText = r.lastCrawlDate;
    if(r.status === 'ok'){
      badgeClass = r.lastCrawlDate === 'Never Crawled' ? 'badge-never' : 'badge-ok';
    } else if(r.status === 'error'){
      badgeClass = 'badge-err';
    } else if(i === workflow.currentIndex && workflow.state === 'running'){
      badgeClass = 'badge-running';
      badgeText = 'Checking...';
    }

    return '<tr class="' + rowClass + '"><td>' + (i+1) + '</td><td>' + escapeHtml(r.url) + '</td><td>' + escapeHtml(r.domain) + '</td><td><span class="' + badgeClass + '">' + escapeHtml(badgeText) + '</span></td><td>' + escapeHtml(r.indexStatus) + '</td></tr>';
  }).join('');
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function downloadCSV(){
  if(workflow.results.length === 0){ alert('No results to download yet.'); return; }
  const header = ['URL','Domain','Last Crawl Date','Index Status'];
  const rows = workflow.results.map(r => [r.url, r.domain, r.lastCrawlDate, r.indexStatus]);
  const csv = [header, ...rows].map(row => row.map(cell => '"' + String(cell).replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gsc_crawl_dates_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
